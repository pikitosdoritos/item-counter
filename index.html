<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Item Counter</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>

<body>
    <form action="javascript:">
        <div class="info">
            <span>Coffee</span>
            <span class="price">120uah</span>
        </div>

        <div>
            <button type="button" name="minus">–</button>
            <output name="count">0</output>
            <button type="button" name="plus">+</button>
        </div>
        <output name="summ" class="summ"></output>
        <button class="calculate-btn">Calculate summ</button>
    </form>
</body>

</html>
